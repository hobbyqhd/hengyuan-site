<h1>熔结环氧粉末（FBE）</h1>
<p class="lead">FBE 在合格表面预处理钢基体上形成热固性环氧屏障，既可单独用作外防腐，也可作为多层体系底漆层。</p>
<div class="card">
  <h2>设计关注点</h2>
  <ul>
    <li>表面粗糙度与清洁度（SSPC/NACE 或 ISO 等效）</li>
    <li>双层 FBE 的固化窗口与层间作业</li>
    <li>现场环焊缝防腐材料需与管体涂层体系匹配采购</li>
  </ul>
  <p class="footnote">百科资料提及 3PE、FBE 等防腐体系 —— 最终以涂敷商数据包（DFP）为准。</p>
</div>
