# Workers static assets: `npm run deploy` runs `wrangler deploy` and uploads ./dist.
# Default hostname: https://hengyuan-site.workers.dev (worker `name` must match your account).
name = "hengyuan-site"
compatibility_date = "2025-05-01"

[assets]
directory = "./dist"
# MPA: serve real /en/*.html and /zh/*.html — do not fall back to root index for missing paths
not_found_handling = "404"
